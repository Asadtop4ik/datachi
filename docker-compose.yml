services:
  postgres:
    image: postgres:16
    container_name: datachi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_dev_pw
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - datachi_pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  datachi_pgdata:
